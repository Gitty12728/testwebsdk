<ui-panel position="0 1.0 -1.2" rotation="-25 0 0" width="0.8" height="0.3" border-radius="20" background-color="#1a1a1a" opacity="0.95">
  
  <ui-flex-container justify-content="space-around" align-items="center" width="100%" height="100%">
    
    <ui-button id="btn-play" width="0.18" height="0.12" border-radius="12" background-color="#2ecc71" hover-color="#27ae60">
      <ui-text value="PLAY" color="#ffffff" font-size="16" alignment="center"></ui-text>
    </ui-button>

    <ui-button id="btn-pause" width="0.18" height="0.12" border-radius="12" background-color="#f1c40f" hover-color="#f39c12">
      <ui-text value="PAUSE" color="#ffffff" font-size="16" alignment="center"></ui-text>
    </ui-button>

    <ui-button id="btn-stop" width="0.18" height="0.12" border-radius="12" background-color="#e74c3c" hover-color="#c0392b">
      <ui-text value="STOP" color="#ffffff" font-size="16" alignment="center"></ui-text>
    </ui-button>

  </ui-flex-container>
</ui-panel>
