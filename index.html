<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infoterminal VR-Demo</title>
  <style>
    body { 
      margin: 0; padding: 0; overflow: hidden; 
      background-color: #1a1a1a; font-family: sans-serif; color: white; 
      display: flex; justify-content: center; align-items: center; height: 100vh; 
    }
    #start-vr-button { 
      padding: 25px 60px; font-size: 24px; background-color: #3498db; 
      border: none; border-radius: 12px; color: white; cursor: pointer; 
      font-weight: bold; box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
      transition: transform 0.2s;
    }
    #start-vr-button:hover { transform: scale(1.05); }
  </style>
</head>
<body>

  <button id="start-vr-button">VIRTUELLE WELT BETRETEN</button>

  <canvas id="canvas"></canvas>
  <iwsdk-uikitml src="ui/welcome.json"></iwsdk-uikitml>

  <script type="module" src="/src/index.js"></script>

</body>
</html>
